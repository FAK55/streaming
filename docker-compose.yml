services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    volumes:
      - ./config/mediamtx.yml:/mediamtx.yml
    ports:
      - "8554:8554"     # RTSP
      - "1935:1935"     # RTMP
      - "8888:8888"     # HLS
      - "8889:8889"     # WebRTC
      - "8890:8890/udp" # SRT
      - "9997:9997"     # API
      - "8189:8189/udp" # WebRTC ICE UDP
      - "8189:8189/tcp" # WebRTC ICE TCP
    restart: unless-stopped

  app:
    build: ./app
    container_name: streamlab
    ports:
      - "3000:3000"     # Next.js app
      - "4000:4000"     # WebSocket chat
    depends_on:
      - mediamtx
    restart: unless-stopped
